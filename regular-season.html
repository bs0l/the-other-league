<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" type="image/png" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regular Season Records - The Other League</title>
    <style>
        :root {
            --electric-blue: #00d4ff;
            --gold: #ffd700;
            --dark-bg: #0a0e27;
            --card-bg: #1a1f3a;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 30px 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 215, 0, 0.1));
            border-radius: 20px;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--electric-blue), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .metadata {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 15px;
        }

        nav {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        nav a {
            padding: 12px 25px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid var(--electric-blue);
            border-radius: 10px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--electric-blue);
            color: var(--dark-bg);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid rgba(0, 212, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--electric-blue), var(--gold));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--electric-blue);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .stat-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--electric-blue);
            margin-bottom: 15px;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
        }

        .stat-holder {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .stat-details {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .stat-details a {
            color: var(--electric-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .stat-details a:hover {
            text-decoration: underline;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            color: var(--gold);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 100px 20px;
            font-size: 1.5rem;
            color: var(--text-secondary);
        }

        .error {
            background: rgba(255, 50, 50, 0.1);
            border: 2px solid rgba(255, 50, 50, 0.5);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: #ff6b6b;
        }

        html { scroll-behavior: smooth; }

        .page-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 32px;
        }
        .page-nav a {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.35);
            color: var(--gold);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
            background: rgba(255, 215, 0, 0.06);
        }
        .page-nav a:hover {
            background: rgba(255, 215, 0, 0.18);
            border-color: var(--gold);
        }
        .section-anchor { scroll-margin-top: 20px; }

        /* ── Top-10 / Points Against score rows ─────────────────────────────── */
        .score-row {
            background: var(--card-bg);
            padding: 12px 16px;
            margin-bottom: 7px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .score-row--high  { border-left: 3px solid var(--electric-blue); }
        .score-row--low   { border-left: 3px solid #ff6b6b; }
        .score-row--green { border-left: 3px solid #00ff64; }

        .score-rank {
            color: var(--gold);
            font-weight: 700;
            min-width: 28px;
            flex-shrink: 0;
            font-size: 0.9rem;
        }
        .score-owner {
            flex: 1;
            min-width: 0;
            font-size: 0.95rem;
        }
        .score-team-name {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        .score-pts {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            flex-shrink: 0;
            text-align: right;
        }
        .score-pts--high  { color: var(--electric-blue); }
        .score-pts--low   { color: #ff6b6b; }
        .score-pts--green { color: #00ff64; }
        .score-week {
            flex-shrink: 0;
            text-align: right;
            font-size: 0.8rem;
            line-height: 1.3;
            min-width: 44px;
        }

        /* ── Pinned hamburger button ─────────────────────────────────────────── */
        .nav-toggle {
            display: none;
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 1000;
            align-items: center;
            gap: 8px;
            padding: 9px 14px;
            border-radius: 8px;
            background: rgba(10, 14, 39, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid var(--electric-blue);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            font-size: 1rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            h1 { font-size: 2rem; }
            header { padding: 16px 48px; margin-bottom: 14px; border-radius: 12px; }
            .subtitle { font-size: 1rem; }
            .metadata { font-size: 0.78rem; margin-top: 8px; }

            .nav-toggle { display: flex; }

            nav#mainNav {
                position: fixed;
                top: 0;
                right: 0;
                z-index: 999;
                width: 220px;
                height: 100dvh;
                background: rgba(10, 14, 39, 0.97);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border-left: 2px solid var(--electric-blue);
                padding: 70px 16px 24px;
                flex-direction: column;
                flex-wrap: nowrap;
                justify-content: flex-start;
                gap: 8px;
                overflow-y: auto;
                transition: transform 0.25s ease;
                transform: translateX(0);
                margin-bottom: 0;
            }
            nav#mainNav.collapsed { transform: translateX(110%); }
            nav#mainNav a { padding: 10px 16px; font-size: 0.9rem; border-radius: 8px; }

            .page-nav { gap: 5px; margin-bottom: 10px; }
            .page-nav a { padding: 5px 10px; font-size: 0.75rem; }

            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
            .stat-card { padding: 14px 12px; border-radius: 10px; }
            .stat-icon { font-size: 1.6rem; margin-bottom: 6px; }
            .stat-title { font-size: 0.72rem; margin-bottom: 6px; letter-spacing: 0.5px; }
            .stat-value { font-size: 1.8rem; margin-bottom: 8px; }
            .stat-holder { font-size: 0.95rem; margin-bottom: 6px; }
            .stat-details { font-size: 0.8rem; line-height: 1.4; }
            .badge { font-size: 0.72rem; padding: 3px 8px; }

            .score-team-name { font-size: 0.68rem; }
            .score-owner { font-size: 0.88rem; }
            .score-pts { font-size: 1.2rem; }
            .score-row { padding: 9px 10px; gap: 7px; }
            .score-rank { min-width: 24px; font-size: 0.82rem; }
            .score-week { font-size: 0.75rem; min-width: 38px; }
        }

        @media (max-width: 400px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .stat-value { font-size: 1.55rem; }
            .stat-holder { font-size: 0.85rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:998;"></div>

    <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="mainNav">☰</button>

    <div class="container">
        <header>
            <h1>Regular Season Records</h1>
			<div class="subtitle">Excluding Playoff Games</div>
        </header>

        <nav id="mainNav">
            <a href="index.html">All-Time Records</a>
            <a href="regular-season.html" class="active">Regular Season</a>
            <a href="teams.html">Owner Stats</a>
            <a href="head-to-head.html">Head-to-Head</a>
            <a href="season-stats.html">Season Stats</a>
            <a href="league-history.html">League History</a>
            <!--<a href="rosters.html">Rosters</a>-->
            <!--<a href="roasts.html">Roasts</a>-->
        </nav>

        <div class="page-nav">
            <a href="#section-stats">📊 Stats</a>
            <a href="#section-top-high">⬆️ Top 10 High Scores</a>
            <a href="#section-top-low">⬇️ Top 10 Low Scores</a>
            <a href="#section-pa">🛡️ Points Against</a>
        </div>


        <div id="section-stats" class="section-anchor"></div>
        <div id="stats-container">
            <div class="loading" id="metadata-info">Loading statistics...</div>
        </div>
    </div>

    <script>
        const LEAGUE_ID = 1517226;

        async function loadData() {
            try {
                const [superlatives, metadata, transactionAnalysis] = await Promise.all([
                    fetch('output/superlatives.json').then(r => r.json()),
                    fetch('output/metadata.json').then(r => r.json()),
                    fetch('output/transaction_analysis.json').then(r => r.json())
                ]);

                document.getElementById('metadata-info').innerHTML = `
                    ${metadata.totalSeasons} Seasons (${metadata.inceptionYear}-${metadata.currentYear}) • 
                    ${metadata.totalMatchups} Matchups • 
                    ${metadata.totalTeams} Teams
                `;

                // Regular-season-only sloppy seconds leader (uses the
                // regularSeasonOnly branch, NOT the whole-season allTimeTeamTally,
                // since this page's stats are all regular-season-scoped)
                const sloppyTally = transactionAnalysis.regularSeasonOnly.sloppySeconds.allTimeTeamTally;
                let sloppyLeader = null;
                for (const [owner, count] of Object.entries(sloppyTally)) {
                    if (!sloppyLeader || count > sloppyLeader.count) {
                        sloppyLeader = { owner, count };
                    }
                }

                renderStats(superlatives.regularSeason, sloppyLeader);

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('stats-container').innerHTML = `
                    <div class="error">
                        <h2>Error Loading Data</h2>
                        <p>Could not load statistics.</p>
                        <p>Error: ${error.message}</p>
                    </div>
                `;
            }
        }

		function createMatchupLink(record) {
			const { year, week, matchupPeriodId } = record;
			
			// For years before 2019, just link to scoreboard overview
			// ESPN doesn't support individual matchup links for old years
			if (year < 2019) {
				return `https://fantasy.espn.com/football/league/scoreboard?leagueId=${LEAGUE_ID}&matchupPeriodId=${matchupPeriodId}&seasonId=${year}`;
			}
			
			// For 2019+, link to specific matchup
			const teamId = record.teamId || record.winnerTeamId;
			return `https://fantasy.espn.com/football/boxscore?leagueId=${LEAGUE_ID}&matchupPeriodId=${matchupPeriodId}&scoringPeriodId=${week}&seasonId=${year}&teamId=${teamId}&view=scoringperiod`;
		}

        function renderStats(stats, sloppyLeader) {
            const container = document.getElementById('stats-container');
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">🔥</div>
                        <div class="stat-title">Highest Score</div>
                        <div class="stat-value">${stats.highestScore.score.toFixed(2)}</div>
                        <div class="stat-holder">${stats.highestScore.team}</div>
                        <div class="stat-details">
                            <a href="${createMatchupLink(stats.highestScore)}" target="_blank">${stats.highestScore.year} Week ${stats.highestScore.week}</a>
                            <br>vs ${stats.highestScore.opponent} (${stats.highestScore.opponentScore.toFixed(2)})
                            <div class="badge">Regular Season Only</div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">💀</div>
                        <div class="stat-title">Lowest Score</div>
                        <div class="stat-value">${stats.lowestScore.score.toFixed(2)}</div>
                        <div class="stat-holder">${stats.lowestScore.team}</div>
                        <div class="stat-details">
                            <a href="${createMatchupLink(stats.lowestScore)}" target="_blank">${stats.lowestScore.year} Week ${stats.lowestScore.week}</a>
                            <br>vs ${stats.lowestScore.opponent} (${stats.lowestScore.opponentScore.toFixed(2)})
                            <div class="badge">Regular Season Only</div>
                        </div>
                    </div>

					<div class="stat-card">
						<div class="stat-icon">🎯</div>
						<div class="stat-title">Closest Win</div>
						<div class="stat-value">${stats.closestWin.margin.toFixed(2)}</div>
						<div class="stat-holder">
							${stats.closestWin.winner} vs ${stats.closestWin.loser}
						</div>
						<div class="stat-details">
							${stats.closestWin.winnerScore.toFixed(2)} - ${stats.closestWin.loserScore.toFixed(2)}
							<a href="${createMatchupLink(stats.closestWin)}" target="_blank" style="color: var(--electric-blue); text-decoration: none;">
								(${stats.closestWin.year} Week ${stats.closestWin.week})
							</a>
							<div class="badge">Regular Season Only</div>
						</div>
					</div>

					<div class="stat-card">
						<div class="stat-icon">💥</div>
						<div class="stat-title">Biggest Blowout</div>
						<div class="stat-value">${stats.biggestBlowout.margin.toFixed(2)}</div>
						<div class="stat-holder">
							${stats.biggestBlowout.winner} vs ${stats.biggestBlowout.loser}
						</div>
						<div class="stat-details">
							${stats.biggestBlowout.winnerScore.toFixed(2)} - ${stats.biggestBlowout.loserScore.toFixed(2)}
							<a href="${createMatchupLink(stats.biggestBlowout)}" target="_blank" style="color: var(--electric-blue); text-decoration: none;">
								(${stats.biggestBlowout.year} Week ${stats.biggestBlowout.week})
							</a>
							<div class="badge">Regular Season Only</div>
						</div>
					</div>

					<div class="stat-card">
						<div class="stat-icon">🔥</div>
						<div class="stat-title">Highest Scoring Game</div>
						<div class="stat-value">${stats.highestScoringGame.total.toFixed(2)}</div>
						<div class="stat-holder">
							${stats.highestScoringGame.team1} vs ${stats.highestScoringGame.team2}
						</div>
						<div class="stat-details">
							${stats.highestScoringGame.score1.toFixed(2)} - ${stats.highestScoringGame.score2.toFixed(2)}
							<a href="${createMatchupLink(stats.highestScoringGame)}" target="_blank" style="color: var(--electric-blue); text-decoration: none;">
								(${stats.highestScoringGame.year} Week ${stats.highestScoringGame.week})
							</a>
							<div class="badge">Regular Season Only</div>
						</div>
					</div>

					<div class="stat-card">
						<div class="stat-icon">🥶</div>
						<div class="stat-title">Lowest Scoring Game</div>
						<div class="stat-value">${stats.lowestScoringGame.total.toFixed(2)}</div>
						<div class="stat-holder">
							${stats.lowestScoringGame.team1} vs ${stats.lowestScoringGame.team2}
						</div>
						<div class="stat-details">
							${stats.lowestScoringGame.score1.toFixed(2)} - ${stats.lowestScoringGame.score2.toFixed(2)}
							<a href="${createMatchupLink(stats.lowestScoringGame)}" target="_blank" style="color: var(--electric-blue); text-decoration: none;">
								(${stats.lowestScoringGame.year} Week ${stats.lowestScoringGame.week})
							</a>
							<div class="badge">Regular Season Only</div>
						</div>
					</div>
					
					<div class="stat-card">
						<div class="stat-icon">🔥</div>
						<div class="stat-title">Longest Win Streak</div>
						<div class="stat-value">${stats.longestWinStreak.length}</div>
						<div class="stat-holder">${stats.longestWinStreak.owner}</div>
						<div class="stat-details">
							${stats.longestWinStreak.startYear} Week ${stats.longestWinStreak.startWeek} - 
							${stats.longestWinStreak.isOngoing ? 'Present' : `${stats.longestWinStreak.endYear} Week ${stats.longestWinStreak.endWeek}`}
							<div class="badge">Regular Season Only</div>
						</div>
					</div>

					<div class="stat-card">
						<div class="stat-icon">💔</div>
						<div class="stat-title">Longest Loss Streak</div>
						<div class="stat-value">${stats.longestLossStreak.length}</div>
						<div class="stat-holder">${stats.longestLossStreak.owner}</div>
						<div class="stat-details">
							${stats.longestLossStreak.startYear} Week ${stats.longestLossStreak.startWeek} - 
							${stats.longestLossStreak.isOngoing ? 'Present' : `${stats.longestLossStreak.endYear} Week ${stats.longestLossStreak.endWeek}`}
							<div class="badge">Regular Season Only</div>
						</div>
					</div>


					<div class="stat-card">
						<div class="stat-icon">⭐</div>
						<div class="stat-title">Most Weekly High Scores</div>
						<div class="stat-value">${stats.mostWeeklyHighScores.count}</div>
						<div class="stat-holder">${stats.mostWeeklyHighScores.owner}</div>
						<div class="badge">Regular Season Only</div>
					</div>

					<div class="stat-card">
						<div class="stat-icon">📉</div>
						<div class="stat-title">Most Weekly Low Scores</div>
						<div class="stat-value">${stats.mostWeeklyLowScores.count}</div>
						<div class="stat-holder">${stats.mostWeeklyLowScores.owner}</div>
						<div class="badge">Regular Season Only</div>
					</div>

					<div class="stat-card">
						<div class="stat-icon">♻️</div>
						<div class="stat-title">Most Sloppy Seconds</div>
						<div class="stat-value">${sloppyLeader ? sloppyLeader.count : 'N/A'}</div>
						<div class="stat-holder">${sloppyLeader ? sloppyLeader.owner : 'N/A'}</div>
						<div class="stat-details">Most pickups of a player another team dropped that same season (2019+)</div>
						<div class="badge">Regular Season Only</div>
					</div>
                </div>
            `;
			
			// After the main stats grid, add top 10 sections
			container.innerHTML += `
				<div id="section-top-high" class="section-anchor">
				<h2 style="color: var(--electric-blue); font-family: 'Bebas Neue', sans-serif; font-size: 2rem; margin: 40px 0 20px 0; text-align: center;">Top 10 Highest Scores</h2>
				<div style="max-width: 800px; margin: 0 auto;">
					${stats.top10HighestScores.map((score, index) => `
						<div class="score-row score-row--high">
							<span class="score-rank">#${index + 1}</span>
							<span class="score-owner">
								<strong>${score.owner || score.team}</strong>
								<span class="score-team-name">${score.team}</span>
							</span>
							<span class="score-pts score-pts--high">${score.score.toFixed(2)}</span>
							<span class="score-week">
								<a href="${createMatchupLink(score)}" target="_blank" style="color: var(--electric-blue); text-decoration: none;">${score.year}<br>Wk ${score.week}</a>
							</span>
						</div>
					`).join('')}
				</div>
				</div>

				<div id="section-top-low" class="section-anchor">
				<h2 style="color: var(--electric-blue); font-family: 'Bebas Neue', sans-serif; font-size: 2rem; margin: 40px 0 20px 0; text-align: center;">Top 10 Lowest Scores</h2>
				<div style="max-width: 800px; margin: 0 auto;">
					${stats.top10LowestScores.map((score, index) => `
						<div class="score-row score-row--low">
							<span class="score-rank">#${index + 1}</span>
							<span class="score-owner">
								<strong>${score.owner || score.team}</strong>
								<span class="score-team-name">${score.team}</span>
							</span>
							<span class="score-pts score-pts--low">${score.score.toFixed(2)}</span>
							<span class="score-week">
								<a href="${createMatchupLink(score)}" target="_blank" style="color: var(--electric-blue); text-decoration: none;">${score.year}<br>Wk ${score.week}</a>
							</span>
						</div>
					`).join('')}
				</div>
				</div>

				<div id="section-pa" class="section-anchor">
				<h2 style="color: var(--electric-blue); font-family: 'Bebas Neue', sans-serif; font-size: 2rem; margin: 40px 0 20px 0; text-align: center;">Most Points Against (Single Season)</h2>
				<div style="max-width: 800px; margin: 0 auto;">
					${stats.mostPointsAgainstSeasons ? stats.mostPointsAgainstSeasons.map((season, index) => `
						<div class="score-row score-row--high">
							<span class="score-rank">#${index + 1}</span>
							<span class="score-owner">
								<strong>${season.owner}</strong>
								<span class="score-team-name">${season.teamName}</span>
							</span>
							<span class="score-pts score-pts--high">${season.pointsAgainst.toFixed(2)}</span>
							<span class="score-week">
								<a href="https://fantasy.espn.com/football/league/standings?leagueId=1517226&seasonId=${season.year}" target="_blank" style="color: var(--electric-blue); text-decoration: none;">${season.year}</a>
							</span>
						</div>
					`).join('') : '<div style="text-align: center; color: var(--text-secondary);">No data available</div>'}
				</div>

				<h2 style="color: var(--electric-blue); font-family: 'Bebas Neue', sans-serif; font-size: 2rem; margin: 40px 0 20px 0; text-align: center;">Fewest Points Against (Single Season)</h2>
				<div style="max-width: 800px; margin: 0 auto;">
					${stats.fewestPointsAgainstSeasons ? stats.fewestPointsAgainstSeasons.map((season, index) => `
						<div class="score-row score-row--green">
							<span class="score-rank">#${index + 1}</span>
							<span class="score-owner">
								<strong>${season.owner}</strong>
								<span class="score-team-name">${season.teamName}</span>
							</span>
							<span class="score-pts score-pts--green">${season.pointsAgainst.toFixed(2)}</span>
							<span class="score-week">
								<a href="https://fantasy.espn.com/football/league/standings?leagueId=1517226&seasonId=${season.year}" target="_blank" style="color: var(--electric-blue); text-decoration: none;">${season.year}</a>
							</span>
						</div>
					`).join('') : '<div style="text-align: center; color: var(--text-secondary);">No data available</div>'}
				</div>
				</div>
			`;
        }

        // ── Hamburger nav + overlay ──────────────────────────────────────────────
        (function () {
            const btn     = document.getElementById('navToggle');
            const nav     = document.getElementById('mainNav');
            const overlay = document.getElementById('navOverlay');
            if (!btn || !nav || !overlay) return;

            function isMobile() { return window.innerWidth <= 768; }

            function closeNav() {
                nav.classList.add('collapsed');
                btn.setAttribute('aria-expanded', 'false');
                overlay.style.display = 'none';
            }

            function applyState() {
                if (isMobile()) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                    nav.classList.remove('collapsed');
                    overlay.style.display = 'none';
                }
            }

            btn.addEventListener('click', function () {
                const nowCollapsed = nav.classList.toggle('collapsed');
                btn.setAttribute('aria-expanded', String(!nowCollapsed));
                overlay.style.display = nowCollapsed ? 'none' : 'block';
            });

            overlay.addEventListener('click', closeNav);

            if (isMobile()) nav.classList.add('collapsed');
            applyState();
            window.addEventListener('resize', applyState);
        })();

        // ── Back to top ──────────────────────────────────────────────────────────
        window.addEventListener('scroll', function () {
            const btt = document.getElementById('backToTop');
            if (btt) btt.style.display = window.scrollY > 300 ? 'block' : 'none';
        });

        loadData();
    </script>
    <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"
        style="display:none; position:fixed; bottom:20px; right:20px; z-index:1001;
               width:42px; height:42px; border-radius:50%;
               border:2px solid var(--electric-blue);
               background:rgba(10,14,39,0.92); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
               color:var(--electric-blue); font-size:1.2rem; cursor:pointer; line-height:1;
               box-shadow:0 4px 16px rgba(0,212,255,0.3); transition:opacity 0.2s ease;">
        ↑
    </button>
</body>
</html>
