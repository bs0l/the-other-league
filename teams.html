<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" type="image/png" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Statistics - The Other League</title>
    <style>
        :root {
            --electric-blue: #00d4ff;
            --gold: #ffd700;
            --dark-bg: #0a0e27;
            --card-bg: #1a1f3a;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --inactive: #666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 30px 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 215, 0, 0.1));
            border-radius: 20px;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--electric-blue), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        nav {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        nav a {
            padding: 12px 25px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid var(--electric-blue);
            border-radius: 10px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--electric-blue);
            color: var(--dark-bg);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .controls select, .controls label {
            padding: 10px 20px;
            background: var(--card-bg);
            border: 2px solid var(--electric-blue);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .controls label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .team-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid rgba(0, 212, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .team-card.inactive {
            opacity: 0.6;
            border-color: var(--inactive);
        }

        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--electric-blue), var(--gold));
        }

        .team-card.inactive::before {
            background: var(--inactive);
        }

        .team-card:hover {
            transform: translateY(-5px);
            border-color: var(--electric-blue);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
        }

        .team-logo {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--electric-blue);
            object-fit: cover;
            background: var(--dark-bg);
        }

        .team-card.inactive .team-logo {
            border-color: var(--inactive);
            opacity: 0.5;
        }

        .team-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
        }

        .team-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--electric-blue);
            margin-bottom: 5px;
        }

        .team-card.inactive .team-name {
            color: var(--inactive);
        }

        .team-abbrev {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .inactive-badge {
            display: inline-block;
            background: rgba(255, 50, 50, 0.2);
            color: #ff6b6b;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-value {
            font-weight: 700;
            color: var(--text);
            font-size: 1rem;
        }

        .stat-value.highlight {
            color: var(--electric-blue);
        }

        .stat-value.gold {
            color: var(--gold);
        }

        .record {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gold);
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .streak {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .streak.win {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
        }

        .streak.loss {
            background: rgba(255, 50, 50, 0.2);
            color: #ff6b6b;
        }

        .chart-container {
            position: relative;
            height: 200px;
            margin: 20px 0;
        }

        .yearly-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .year-pill {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .year-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
            border-color: var(--electric-blue);
        }

        .year-label {
            color: var(--electric-blue);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .year-record {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .year-pill.playoff {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
        }

        .loading {
            text-align: center;
            padding: 100px 20px;
            font-size: 1.5rem;
            color: var(--text-secondary);
        }

        /* ── Pinned hamburger button ─────────────────────────────────────────── */
        .nav-toggle {
            display: none;
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 1000;
            align-items: center;
            padding: 9px 14px;
            border-radius: 8px;
            background: rgba(10, 14, 39, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid var(--electric-blue);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            font-size: 1rem;
            cursor: pointer;
        }

        /* ── Focus / List mode toggle ────────────────────────────────────────── */
        .view-toggle {
            display: flex;
            gap: 0;
            border: 2px solid var(--electric-blue);
            border-radius: 8px;
            overflow: hidden;
        }
        .view-toggle button {
            padding: 10px 18px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Work Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .view-toggle button.active {
            background: var(--electric-blue);
            color: var(--dark-bg);
        }
        .view-toggle button:first-child { border-right: 1px solid rgba(0,212,255,0.3); }

        /* Owner picker (focus mode) */
        .owner-picker {
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .owner-picker.visible { display: flex; }
        .owner-btn {
            padding: 8px 16px;
            background: rgba(0,212,255,0.08);
            border: 1.5px solid rgba(0,212,255,0.35);
            border-radius: 20px;
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .owner-btn:hover, .owner-btn.selected {
            background: var(--electric-blue);
            color: var(--dark-bg);
            border-color: var(--electric-blue);
        }

        /* In focus mode, hide the grid and show single card */
        .focus-mode .team-grid { display: none; }
        .focus-card-wrapper {
            display: none;
            max-width: 700px;
            margin: 0 auto;
        }
        .focus-mode .focus-card-wrapper { display: block; }

        /* ── Responsive ──────────────────────────────────────────────────────── */
        @media (max-width: 900px) {
            .team-grid {
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                gap: 18px;
            }
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            h1 { font-size: 2rem; }
            header { padding: 16px 48px; margin-bottom: 14px; border-radius: 12px; }
            .subtitle { font-size: 1rem; }

            .nav-toggle { display: flex; }

            nav#mainNav {
                position: fixed;
                top: 0;
                right: 0;
                z-index: 999;
                width: 220px;
                height: 100dvh;
                background: rgba(10, 14, 39, 0.97);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border-left: 2px solid var(--electric-blue);
                padding: 70px 16px 24px;
                flex-direction: column;
                flex-wrap: nowrap;
                justify-content: flex-start;
                gap: 8px;
                overflow-y: auto;
                transition: transform 0.25s ease;
                transform: translateX(0);
                margin-bottom: 0;
            }
            nav#mainNav.collapsed { transform: translateX(110%); }
            nav#mainNav a { padding: 10px 16px; font-size: 0.9rem; border-radius: 8px; }

            .controls { gap: 10px; }
            .controls select, .controls label {
                padding: 8px 12px;
                font-size: 0.88rem;
                width: 100%;
            }

            .team-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .team-card { padding: 18px 16px; }

            .team-logo { width: 44px; height: 44px; top: 12px; right: 12px; }
            .team-name { font-size: 1.2rem; padding-right: 52px; }
            .team-abbrev { font-size: 0.82rem; }

            .stat-label { font-size: 0.82rem; }
            .stat-value { font-size: 0.9rem; }
            .record { font-size: 1.4rem; }
            .section-title { font-size: 0.95rem; margin: 14px 0 7px; }

            .yearly-grid {
                grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
                gap: 7px;
            }
            .year-pill { padding: 6px 4px; font-size: 0.78rem; }
            .year-record { font-size: 0.72rem; }
            .chart-container { height: 160px; margin: 12px 0; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="navOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:998;"></div>
    <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="mainNav">☰</button>

    <div class="container">
        <header>
            <h1>Owner Statistics</h1>
            <div class="subtitle">Career Records & Performance by Manager</div>
        </header>

        <nav id="mainNav">
            <a href="index.html">All-Time Records</a>
            <a href="regular-season.html">Regular Season</a>
            <a href="teams.html" class="active">Owner Stats</a>
            <a href="head-to-head.html">Head-to-Head</a>
            <a href="season-stats.html">Season Stats</a>
            <a href="league-history.html">League History</a>
            <!--<a href="rosters.html">Rosters</a>-->
            <!--<a href="roasts.html">Roasts</a>-->
        </nav>

        <div class="controls">
            <div class="view-toggle">
                <button id="btn-list" class="active" onclick="setViewMode('list')">☰ All</button>
                <button id="btn-focus" onclick="setViewMode('focus')">👤 Individual</button>
            </div>

            <select id="sort-select">
                <option value="winPct">Sort by Win %</option>
                <option value="totalWins">Sort by Total Wins</option>
                <option value="totalLosses">Sort by Total Losses</option>
                <option value="championships">Sort by Championships</option>
                <option value="playoffApps">Sort by Playoff Appearances</option>
                <option value="pointsFor">Sort by Points For</option>
                <option value="pointsAgainst">Sort by Points Against</option>
                <option value="avgPoints">Sort by Avg Points</option>
                <option value="bestSeason">Sort by Best Season Win %</option>
                <option value="worstSeason">Sort by Worst Season Win %</option>
                <option value="mostWinsSeason">Sort by Most Wins (Season)</option>
                <option value="mostLossesSeason">Sort by Most Losses (Season)</option>
                <option value="mostMoves">Sort by Most Moves (Season)</option>
            </select>

            <label>
                <input type="checkbox" id="show-inactive">
                Show Inactive Teams
            </label>
        </div>

        <!-- Owner picker shown in focus mode -->
        <div class="owner-picker" id="owner-picker"></div>

        <div id="teams-container">
            <div class="loading" id="metadata-info">Loading team statistics...</div>
        </div>
    </div>

    <script>
        let teamsData = [];
        let showInactive = false;
        let currentSort = 'winPct';
        let viewMode = 'list';       // 'list' | 'focus'
        let focusOwner = null;
        let chartInstances = {};     // track Chart.js instances to destroy on re-render

        async function loadData() {
            try {
                const [teamStats, transactionAnalysis] = await Promise.all([
                    fetch('output/team_stats.json').then(r => r.json()),
                    fetch('output/transaction_analysis.json').then(r => r.json())
                ]);
                teamsData = Object.values(teamStats);

                // Attach each owner's all-time sloppy-seconds count (2019+ only -
                // see transaction_analysis.json metadata for why earlier years are excluded)
                const sloppyTally = transactionAnalysis.sloppySeconds.allTimeTeamTally;
                teamsData.forEach(team => {
                    team.sloppySecondsAllTime = sloppyTally[team.owner] || 0;
                });

                renderTeams(currentSort);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('teams-container').innerHTML = `
                    <div class="error">
                        <h2>Error Loading Data</h2>
                        <p>Could not load team statistics.</p>
                    </div>
                `;
            }
        }

        // ── View mode ────────────────────────────────────────────────────────────
        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById('btn-list').classList.toggle('active', mode === 'list');
            document.getElementById('btn-focus').classList.toggle('active', mode === 'focus');

            const sortSelect = document.getElementById('sort-select');
            const picker = document.getElementById('owner-picker');

            if (mode === 'focus') {
                sortSelect.style.display = 'none';
                picker.classList.add('visible');
                buildOwnerPicker();
                // Select first owner if none selected
                if (!focusOwner) {
                    const first = getFilteredSorted()[0];
                    if (first) selectOwner(first.owner);
                } else {
                    renderTeams(currentSort);
                }
            } else {
                sortSelect.style.display = '';
                picker.classList.remove('visible');
                renderTeams(currentSort);
            }
        }

        function buildOwnerPicker() {
            const picker = document.getElementById('owner-picker');
            const teams = getFilteredSorted();
            picker.innerHTML = teams.map(t => `
                <button class="owner-btn ${focusOwner === t.owner ? 'selected' : ''}"
                        onclick="selectOwner('${t.owner.replace(/'/g, "\\'")}')">
                    ${t.owner.split(' ')[0]}
                </button>
            `).join('');
        }

        function selectOwner(owner) {
            focusOwner = owner;
            // Update picker button states
            document.querySelectorAll('.owner-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.textContent.trim() === owner.split(' ')[0]);
            });
            renderTeams(currentSort);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function getFilteredSorted() {
            let teams = showInactive ? teamsData : teamsData.filter(t => t.isActive);
            return [...teams].sort((a, b) => {
                switch(currentSort) {
                    case 'winPct':        return b.overall.winPercentage - a.overall.winPercentage;
                    case 'totalWins':     return b.overall.wins - a.overall.wins;
                    case 'totalLosses':   return b.overall.losses - a.overall.losses;
                    case 'championships': return b.championships - a.championships;
                    case 'playoffApps':   return b.playoffAppearances - a.playoffAppearances;
                    case 'pointsFor':     return b.totalPointsFor - a.totalPointsFor;
                    case 'pointsAgainst': return b.totalPointsAgainst - a.totalPointsAgainst;
                    case 'avgPoints':     return b.avgPointsFor - a.avgPointsFor;
                    case 'bestSeason':    return (b.bestSeasonWinPct || 0) - (a.bestSeasonWinPct || 0);
                    case 'worstSeason':   return (a.worstSeasonWinPct || 1) - (b.worstSeasonWinPct || 1);
                    case 'mostWinsSeason':   return (b.mostWinsSeason || 0) - (a.mostWinsSeason || 0);
                    case 'mostLossesSeason': return (b.mostLossesSeason || 0) - (a.mostLossesSeason || 0);
                    case 'mostMoves':     return (b.mostMovesSeason || 0) - (a.mostMovesSeason || 0);
                    default: return 0;
                }
            });
        }

        function renderTeams(sortBy) {
            currentSort = sortBy;
            const container = document.getElementById('teams-container');

            // Destroy existing charts
            Object.values(chartInstances).forEach(c => c.destroy());
            chartInstances = {};

            const sorted = getFilteredSorted();

            if (viewMode === 'focus') {
                // Ensure a valid owner is selected
                if (!focusOwner || !sorted.find(t => t.owner === focusOwner)) {
                    focusOwner = sorted[0]?.owner || null;
                }
                const team = sorted.find(t => t.owner === focusOwner);
				container.innerHTML = team
					? `<div style="max-width:700px;margin:0 auto;">${createTeamCard(team)}</div>`
					: '<p style="text-align:center;color:var(--text-secondary)">No owner selected.</p>';
            } else {
                container.innerHTML = `
                    <div class="team-grid">
                        ${sorted.map(team => createTeamCard(team)).join('')}
                    </div>
                `;
            }

            // Draw charts
            sorted.forEach(team => {
                if (team.totalGames > 0) createTeamChart(team);
            });
        }

        function createTeamCard(team) {
            if (!team.owner) return '<div class="stat-card"><div class="stat-row">Error: Missing owner data</div></div>';

            const inactiveClass = team.isActive ? '' : 'inactive';
            const inactiveBadge = team.isActive ? '' : '<span class="inactive-badge">Inactive</span>';

            const currentStreak = team.currentStreak && team.currentStreak.type
                ? `<span class="streak ${team.currentStreak.type.toLowerCase()}">${team.currentStreak.type} ${team.currentStreak.length}</span>`
                : '<span class="stat-value">—</span>';

            const yearRange = team.foundedYear === team.lastActiveYear
                ? team.foundedYear
                : `${team.foundedYear}-${team.lastActiveYear}`;

            const teamNamesDisplay = team.allTeamNames && team.allTeamNames.length > 1
                ? `<div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 5px;">Also known as: ${team.allTeamNames.filter(n => n !== team.teamName).join(', ')}</div>`
                : '';

            const yearlyHTML = team.yearlyRecords ? Object.entries(team.yearlyRecords)
                .sort(([a], [b]) => parseInt(b) - parseInt(a))
                .map(([year, record]) => {
                    const wonChampionship = team.championshipYears && team.championshipYears.includes(parseInt(year));
                    const standingsUrl = `https://fantasy.espn.com/football/league/standings?leagueId=1517226&seasonId=${year}`;
                    return `
                        <a href="${standingsUrl}" target="_blank" style="text-decoration: none; color: inherit;">
                            <div class="year-pill ${wonChampionship ? 'playoff' : ''}">
                                <div class="year-label">${year}</div>
                                <div class="year-record">${record.regularSeasonWins}-${record.regularSeasonLosses}</div>
                            </div>
                        </a>
                    `;
                }).join('') : '';

            const chartId = `chart-${team.owner.replace(/[^a-zA-Z0-9]/g, '_')}`;

            return `
                <div class="team-card ${inactiveClass}">
                    ${team.logoUrl ? `<img src="${team.logoUrl}" alt="${team.teamName}" class="team-logo" onerror="this.style.display='none'">` : ''}
                    <div class="team-header">
                        <div class="team-name">${team.teamName}${inactiveBadge}</div>
                        <div class="team-abbrev">
                            <strong>Owner:</strong> ${team.owner} • ${team.abbrev} • ${yearRange}
                        </div>
                        ${teamNamesDisplay}
                    </div>

                    ${team.totalGames > 0 ? `
                    <div class="section-title">Overall Record</div>
                    <div class="stat-row">
                        <span class="stat-label">Career Record</span>
                        <span class="stat-value record ${currentSort === 'totalWins' || currentSort === 'totalLosses' ? 'highlight' : ''}">${team.overall.wins}-${team.overall.losses}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Win Percentage</span>
                        <span class="stat-value ${currentSort === 'winPct' ? 'highlight' : ''}">${(team.overall.winPercentage * 100).toFixed(1)}%</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Regular Season</span>
                        <span class="stat-value">${team.regularSeason.wins}-${team.regularSeason.losses} (${(team.regularSeason.winPercentage * 100).toFixed(1)}%)</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Playoffs</span>
                        <span class="stat-value">${team.playoffs.wins}-${team.playoffs.losses} (${(team.playoffs.winPercentage * 100).toFixed(1)}%)</span>
                    </div>

                    <div class="section-title">Yearly Performance</div>
                    <div class="chart-container">
                        <canvas id="${chartId}"></canvas>
                    </div>

                    <div class="section-title">Championships</div>
                    <div class="stat-row">
                        <span class="stat-label">Championships</span>
                        <span class="stat-value gold">🏆 ${team.championships}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Championship Appearances</span>
                        <span class="stat-value">${team.championshipAppearances}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Playoff Appearances</span>
                        <span class="stat-value ${currentSort === 'playoffApps' ? 'highlight' : ''}">${team.playoffAppearances} / ${team.seasonsPlayed}</span>
                    </div>

                    <div class="section-title">Scoring</div>
                    <div class="stat-row">
                        <span class="stat-label">Total Points For</span>
                        <span class="stat-value ${currentSort === 'pointsFor' ? 'highlight' : ''}">${team.totalPointsFor.toFixed(2)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Avg Points For</span>
                        <span class="stat-value ${currentSort === 'avgPoints' ? 'highlight' : ''}">${team.avgPointsFor.toFixed(2)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Total Points Against</span>
                        <span class="stat-value ${currentSort === 'pointsAgainst' ? 'highlight' : ''}">${team.totalPointsAgainst.toFixed(2)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Avg Points Against</span>
                        <span class="stat-value">${team.avgPointsAgainst.toFixed(2)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Highest Score</span>
                        <span class="stat-value">${team.highestScore.toFixed(2)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Lowest Score</span>
                        <span class="stat-value">${team.lowestScore.toFixed(2)}</span>
                    </div>

                    <div class="section-title">Head-to-Head Records</div>
                    ${team.bestOpponent ? `
                        <div class="stat-row">
                            <span class="stat-label">Best Matchup</span>
                            <span class="stat-value">${team.bestOpponentRecord} vs ${team.bestOpponent}</span>
                        </div>
                    ` : ''}
                    ${team.worstOpponent ? `
                        <div class="stat-row">
                            <span class="stat-label">Worst Matchup</span>
                            <span class="stat-value">${team.worstOpponentRecord} vs ${team.worstOpponent}</span>
                        </div>
                    ` : ''}

                    <div class="section-title">Season Records</div>
                    <div class="stat-row">
                        <span class="stat-label">Best Season</span>
                        <span class="stat-value ${currentSort === 'bestSeason' || currentSort === 'mostWinsSeason' ? 'highlight' : ''}">${team.bestSeasonWins}-${team.bestSeasonLosses} (${((team.bestSeasonWinPct || 0) * 100).toFixed(1)}%) - ${team.bestSeasonYear}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Worst Season</span>
                        <span class="stat-value ${currentSort === 'worstSeason' || currentSort === 'mostLossesSeason' ? 'highlight' : ''}">${team.worstSeasonWins}-${team.worstSeasonLosses} (${((team.worstSeasonWinPct || 0) * 100).toFixed(1)}%) - ${team.worstSeasonYear}</span>
                    </div>

                    <div class="section-title">Streaks</div>
                    <div class="stat-row">
                        <span class="stat-label">Longest Win Streak</span>
                        <span class="stat-value">${team.longestWinStreak}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Longest Loss Streak</span>
                        <span class="stat-value">${team.longestLossStreak}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Current Streak</span>
                        ${currentStreak}
                    </div>

                    ${team.mostMovesSeason !== null && team.mostMovesSeason !== undefined ? `
                        <div class="section-title">Transaction Activity</div>
                        <div class="stat-row">
                            <span class="stat-label">Most Moves (Season)</span>
                            <span class="stat-value ${currentSort === 'mostMoves' ? 'highlight' : ''}">
                                <a href="https://fantasy.espn.com/football/league/standings?leagueId=1517226&seasonId=${team.mostMovesSeasonYear}"
                                   target="_blank"
                                   style="color: ${currentSort === 'mostMoves' ? 'var(--electric-blue)' : 'var(--text)'}; text-decoration: none;">
                                    ${team.mostMovesSeason} (${team.mostMovesSeasonYear})
                                </a>
                            </span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Total Trades (2019+)</span>
                            <span class="stat-value">${team.totalTrades || 0}</span>
                        </div>
                        <div class="stat-row" style="align-items: flex-start;">
                            <span class="stat-label">Sloppy Seconds<br><span style="font-size:0.72rem; opacity:0.7;">(Most pickups of a player dropped by another team that season, 2019+)</span></span>
                            <span class="stat-value">${team.sloppySecondsAllTime || 0}</span>
                        </div>
                    ` : ''}

                    ${team.mostLoyalPlayer ? `
                        <div class="section-title">"I Wish I Knew How to Quit You"</div>
                        <div class="stat-row">
                            <span class="stat-label">Most Rostered Player</span>
                            <span class="stat-value">${team.mostLoyalPlayer}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Seasons Together</span>
                            <span class="stat-value">${team.mostLoyalPlayerSeasons} (${team.mostLoyalPlayerYears.join(', ')})</span>
                        </div>
                    ` : ''}

                    <div class="section-title">Year-by-Year</div>
                    <div class="yearly-grid">
                        ${yearlyHTML}
                    </div>
                    ` : `
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value">No games recorded</span>
                    </div>
                    `}
                </div>
            `;
        }

        function createTeamChart(team) {
            if (!team.yearlyRecords) return;

            const years = Object.keys(team.yearlyRecords).sort();
            const wins   = years.map(y => team.yearlyRecords[y].regularSeasonWins ?? team.yearlyRecords[y].wins);
            const losses = years.map(y => team.yearlyRecords[y].regularSeasonLosses ?? team.yearlyRecords[y].losses);

            const chartId = `chart-${team.owner.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const ctx = document.getElementById(chartId);
            if (!ctx) return;

            // Destroy previous instance if it exists
            if (chartInstances[chartId]) chartInstances[chartId].destroy();

            chartInstances[chartId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [{
                        label: 'Wins',
                        data: wins,
                        borderColor: '#00ff64',
                        backgroundColor: 'rgba(0, 255, 100, 0.1)',
                        tension: 0.3,
                        yAxisID: 'y'
                    }, {
                        label: 'Losses',
                        data: losses,
                        borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255, 107, 107, 0.1)',
                        tension: 0.3,
                        yAxisID: 'y'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#ffffff', font: { size: 11 } } }
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            ticks: { color: '#ffffff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        y1: {
                            type: 'linear',
                            display: false,
                            position: 'right',
                            ticks: { color: '#ffffff' },
                            grid: { drawOnChartArea: false }
                        },
                        x: {
                            ticks: { color: '#ffffff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        // ── Hamburger nav + overlay ──────────────────────────────────────────────
        (function () {
            const btn     = document.getElementById('navToggle');
            const nav     = document.getElementById('mainNav');
            const overlay = document.getElementById('navOverlay');
            if (!btn || !nav || !overlay) return;

            function isMobile() { return window.innerWidth <= 768; }

            function closeNav() {
                nav.classList.add('collapsed');
                btn.setAttribute('aria-expanded', 'false');
                overlay.style.display = 'none';
            }

            function applyState() {
                if (isMobile()) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                    nav.classList.remove('collapsed');
                    overlay.style.display = 'none';
                }
            }

            btn.addEventListener('click', function () {
                const nowCollapsed = nav.classList.toggle('collapsed');
                btn.setAttribute('aria-expanded', String(!nowCollapsed));
                overlay.style.display = nowCollapsed ? 'none' : 'block';
            });

            overlay.addEventListener('click', closeNav);

            if (isMobile()) nav.classList.add('collapsed');
            applyState();
            window.addEventListener('resize', applyState);
        })();

        // ── Back to top ──────────────────────────────────────────────────────────
        window.addEventListener('scroll', function () {
            const btt = document.getElementById('backToTop');
            if (btt) btt.style.display = window.scrollY > 300 ? 'block' : 'none';
        });

        // ── Event listeners ──────────────────────────────────────────────────────
        document.getElementById('sort-select').addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderTeams(currentSort);
        });
        document.getElementById('show-inactive').addEventListener('change', (e) => {
            showInactive = e.target.checked;
            if (viewMode === 'focus') buildOwnerPicker();
            renderTeams(currentSort);
        });

        loadData();
    </script>

    <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"
        style="display:none; position:fixed; bottom:20px; right:20px; z-index:1001;
               width:42px; height:42px; border-radius:50%;
               border:2px solid var(--electric-blue);
               background:rgba(10,14,39,0.92); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
               color:var(--electric-blue); font-size:1.2rem; cursor:pointer; line-height:1;
               box-shadow:0 4px 16px rgba(0,212,255,0.3);">
        ↑
    </button>
</body>
</html>
